name: Build Release Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create release for (for example: v1.0.0)"
        required: true
        type: string
      release_name:
        description: "Release title (optional)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Resolve release metadata
        id: metadata
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ github.event.inputs.tag }}"
          fi

          RELEASE_NAME="${{ github.event.inputs.release_name }}"
          if [[ -z "${RELEASE_NAME}" ]]; then
            RELEASE_NAME="Release ${TAG}"
          fi

          ZIP_NAME="potoki-${TAG}.zip"

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${RELEASE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "zip_name=${ZIP_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Package dist directory
        run: |
          cd dist
          zip -r "../${{ steps.metadata.outputs.zip_name }}" .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: ${{ steps.metadata.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.metadata.outputs.zip_name }}
          generate_release_notes: true
